<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forum - Lumalia</title>

<link rel="icon" href="logo-lumalia.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#080808;
font-family:Arial,sans-serif;
color:white;
min-height:100vh;
}

.background{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#6b5cff33,transparent 30%),
radial-gradient(circle at bottom right,#ff70d933,transparent 30%);
z-index:-1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111111;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
height:60px;
}

.nav{
display:flex;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.nav a:hover{
color:#9b6cff;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.title{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#bdbdbd;
margin-bottom:40px;
}

.create-btn{
display:block;
margin:auto;
padding:15px 30px;
background:linear-gradient(90deg,#6b5cff,#9b6cff);
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:30px;
}

.subject{
background:#111111;
padding:20px;
border-radius:15px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:0.3s;
}

.subject:hover{
border-color:#6b5cff;
transform:translateY(-3px);
}

.subject-title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.subject-info{
color:#bdbdbd;
font-size:14px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111111;
padding:30px;
border-radius:20px;
width:90%;
max-width:600px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
background:#1a1a1a;
border:none;
border-radius:10px;
color:white;
}

.modal-content textarea{
height:180px;
resize:none;
}

.modal-content button{
width:100%;
padding:15px;
background:#6b5cff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="background"></div>

<div class="topbar">

<img src="logo-lumalia.png" class="logo">

<div class="nav">
<a href="index.html">Accueil</a>
<a href="serveurs.html">Serveurs</a>
<a href="wiki.html">Wiki</a>
<a href="forum.html">Forum</a>
<a href="profil.html">Profil</a>
</div>

</div>

<div class="container">

<h1 id="sectionTitle" class="title">
Forum Lumalia
</h1>

<p class="subtitle">
Discute avec la communauté Lumalia.
</p>

<button class="create-btn" onclick="ouvrirSujet()">
➕ Créer un sujet
</button>

<div id="subjectList">

<div class="subject">

<div class="subject-title">
Bienvenue sur le forum
</div>

<div class="subject-info">
Lumalia • Sujet exemple
</div>

</div>

</div>

</div>

<div id="createModal" class="modal">

<div class="modal-content">

<h2>Créer un sujet</h2>

<input
type="text"
id="titreSujet"
placeholder="Titre du sujet">

<textarea
id="contenuSujet"
placeholder="Votre message..."></textarea>

<button onclick="publierSujet()">
Publier
</button>

<br><br>

<button
onclick="fermerSujet()"
style="background:#444;">
Fermer
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBSCqSsBTXk9Q8sBX88NgrdDHUAHT0Cq6I",
authDomain: "lumalia.firebaseapp.com",
projectId: "lumalia"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params =
new URLSearchParams(window.location.search);

const section =
params.get("section");

if(section){

document.getElementById("sectionTitle")
.innerText = section
.replaceAll("-"," ")
.replace(/\b\w/g,l=>l.toUpperCase());

}

chargerSujets();

window.ouvrirSujet = function(){

document.getElementById("createModal")
.style.display = "flex";

}

window.fermerSujet = function(){

document.getElementById("createModal")
.style.display = "none";

}

async function chargerSujets(){

const liste =
document.getElementById("subjectList");

liste.innerHTML = "";

const snapshot =
await getDocs(collection(db,"forum"));

snapshot.forEach((docu)=>{

const sujet = docu.data();

if(sujet.section !== section)
return;

liste.innerHTML += `

<div class="subject">

<div class="subject-title">
${sujet.titre}
</div>

<div class="subject-info">
${sujet.auteur}
</div>

</div>

`;

});

}

window.publierSujet = async function(){

const titre =
document.getElementById("titreSujet").value;

const contenu =
document.getElementById("contenuSujet").value;

if(!titre || !contenu){

alert("Remplissez tous les champs.");
return;

}

try{

await addDoc(
collection(db,"forum"),
{
titre: titre,
contenu: contenu,
section: section,
auteur: "Joueur",
date: new Date().toISOString()
}
);

document.getElementById("titreSujet").value = "";
document.getElementById("contenuSujet").value = "";

fermerSujet();

chargerSujets();

alert("Sujet publié !");

}
catch(error){

console.error(error);

alert("Erreur Firebase : " + error.message);

}

}

</script>

</script>

</body>
</html>
