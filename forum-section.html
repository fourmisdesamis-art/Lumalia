<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forum - Lumalia</title>

<link rel="icon" href="logo-lumalia.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#080808;
font-family:Arial,sans-serif;
color:white;
min-height:100vh;
}

.background{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#6b5cff33,transparent 30%),
radial-gradient(circle at bottom right,#ff70d933,transparent 30%);
z-index:-1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111111;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
height:60px;
}

.nav{
display:flex;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.nav a:hover{
color:#9b6cff;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.title{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#bdbdbd;
margin-bottom:40px;
}

.create-btn{
display:block;
width:250px;
margin:0 auto 30px auto;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6b5cff,#9b6cff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.create-btn:hover{
opacity:0.9;
}

.subject-list{
display:flex;
flex-direction:column;
gap:15px;
}

.subject{
background:#111111;
border:1px solid rgba(255,255,255,0.08);
border-radius:15px;
padding:20px;
transition:0.3s;
cursor:pointer;
}

.subject:hover{
border-color:#6b5cff;
transform:translateY(-3px);
}

.subject-title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.subject-info{
color:#bdbdbd;
font-size:14px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111111;
padding:30px;
border-radius:20px;
width:90%;
max-width:600px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
background:#1a1a1a;
border:none;
border-radius:10px;
color:white;
}

.modal-content textarea{
height:150px;
resize:none;
}

.modal-content button{
width:100%;
padding:15px;
background:#6b5cff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}
