<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lumalia</title>

  <link rel="icon" href="logo-lumalia.png">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0b1020, #05060a);
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      display: flex;
      gap: 40px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      max-width: 800px;
    }

    .left {
      flex: 1;
    }

    .right {
      flex: 1;
      border-left: 1px solid rgba(255,255,255,0.1);
      padding-left: 20px;
    }

    .big404 {
      font-size: 60px;
      font-weight: bold;
      color: #ff5c7a;
    }

    .title {
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 15px;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .code {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="left">
      <div class="title">ERREUR</div>
      <div class="big404">404</div>
      <p>Cette page n’existe pas ou n’est plus disponible,.</p>

      <a class="btn" href="/">🏠 Retour à l’accueil</a>
    </div>

    <div class="right">
      <div class="title">DÉTAILS TECHNIQUES</div>
      <div class="code">
        Message : Page not found<br/>
        Route : inconnue<br/>
        Code : 404
      </div>
    </div>
  </div>

</body>
</html>
