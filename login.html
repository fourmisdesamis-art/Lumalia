<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - Lumalia</title>

<link rel="icon" type="image/png" href="logo-lumalia.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080808;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.background{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#6b5cff33,transparent 30%),
radial-gradient(circle at bottom right,#9b6cff33,transparent 30%);
z-index:-1;
}

.login-box{
width:90%;
max-width:500px;
background:#111111;
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 0 40px rgba(107,92,255,0.15);
}

.logo{
width:100px;
margin-bottom:20px;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#bdbdbd;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:white;
font-size:16px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.btn-register{
background:linear-gradient(90deg,#6b5cff,#9b6cff);
color:white;
}

.btn-login{
background:#1f1f1f;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
color:#9b6cff;
}

.back{
display:block;
margin-top:20px;
color:#9b6cff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="login-box">

<img src="logo-lumalia.png" class="logo">

<h1>Connexion Lumalia</h1>

<p class="subtitle">
Connecte-toi ou crée ton compte.
</p>

<input type="email" id="email" placeholder="Adresse email">

<input type="password" id="password" placeholder="Mot de passe">

<input type="text" id="pseudo" placeholder="Pseudo Minecraft">

<button class="btn btn-register" onclick="register()">
Créer un compte
</button>

<button class="btn btn-login" onclick="login()">
Se connecter
</button>

<p id="message"></p>

<a href="index.html" class="back">
← Retour à l'accueil
</a>

<footer>
    © 2026 Lumalia - Tout droit réservé 
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendEmailVerification
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBSCqSsBTXk9Q8sBX88NgrdDHUAHT0Cq6I",

authDomain: "lumalia.firebaseapp.com",

projectId: "lumalia"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* INSCRIPTION */

window.register = async function(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

const pseudo =
document.getElementById("pseudo").value.trim();

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await sendEmailVerification(
userCredential.user
);

await setDoc(

doc(
db,
"users",
userCredential.user.uid
),

{
email: email,
pseudoMinecraft: pseudo,
rang: "Joueur",
createdAt: new Date().toISOString()
}

);

document.getElementById("message").innerText =
"✅ Compte créé ! Vérifie ta boite mail !.";

}
catch(error){

document.getElementById("message").innerText =
"❌ " + error.message;

console.error(error);

}

};

/* CONNEXION */

window.login = async function(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

try{

const userCredential =
await signInWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

await user.reload();

if(!user.emailVerified){

document.getElementById("message").innerText =
"❌ Vérifie ton email avant de te connecter.";

return;

}

document.getElementById("message").innerText =
"✅ Connexion réussie !";

setTimeout(() => {

window.location.href = "index.html";

},1000);

}
catch(error){

document.getElementById("message").innerText =
"❌ " + error.message;

console.error(error);

}

};

</script>

</div>

</body>
</html>
